<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerOS Clipper</title>
    <style>
      body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 16px; margin: 0; color: #0f172a; }
      h3 { margin-top: 0; font-size: 16px; color: #0f172a; margin-bottom: 8px; }
      p { font-size: 13px; color: #64748b; margin-bottom: 16px; }
      button { 
        width: 100%; padding: 10px; background-color: #4f46e5; color: white; border: none; 
        border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; 
      }
      button:hover { background-color: #4338ca; }
      button:disabled { background-color: #94a3b8; cursor: not-allowed; }
      .success { color: #10b981; font-size: 13px; font-weight: 500; display: none; margin-top: 12px; text-align: center; }
      .error { color: #ef4444; font-size: 13px; font-weight: 500; display: none; margin-top: 12px; text-align: center; }
      #app-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: #6366f1; text-decoration: none; }
      #app-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h3>CareerOS Clipper</h3>
    <p>Clip this job description directly to your CareerOS tracker.</p>
    
    <button id="clip-btn">Clip Job to Tracker</button>
    
    <div id="success-msg" class="success">Job clipped successfully!</div>
    <div id="error-msg" class="error">Failed to clip job. Are you on a job page?</div>
    
    <a id="app-link" href="http://localhost:3000/jobs" target="_blank">Open CareerOS Dashboard</a>
    
    <script src="popup.js"></script>
  </body>
</html>
